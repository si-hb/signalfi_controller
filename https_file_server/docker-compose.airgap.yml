# Air-gap overlay for docker-compose.yml.
#
# Apply with:
#   compose -f docker-compose.yml -f docker-compose.airgap.yml --profile served up -d
#     (Mode A — Signalfi-served: dnsmasq + chrony on the device LAN)
#
#   compose -f docker-compose.yml -f docker-compose.airgap.yml up -d
#     (Mode B — Customer-served: no dnsmasq, no chrony)
#
# Uses !override and !reset from Compose spec v2.24+ (Jan 2024+).  Both Docker
# Compose and Podman Compose support these tags.

services:

  # ── Traefik — strip ACME entirely ────────────────────────────────────────
  # Air-gapped: no external DNS, no HTTP challenge possible.  All TLS comes
  # from the file provider pointing at the Signalfi-PKI combined fullchain.
  traefik:
    command: !override
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=root_default"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=600"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=600"
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./traefik-dynamic:/etc/traefik/dynamic:ro

  # ── Node-RED — weather router disabled ───────────────────────────────────
  # weather.apis.symphonyinteractive.ca is a public-internet dashboard with
  # no purpose in an air-gapped install.  Drop the Traefik labels entirely.
  node-red:
    labels: !reset
      - "traefik.enable=false"

  # ── signalfi-manifest — admin routers on Signalfi PKI, not Let's Encrypt ─
  # Only diff from prod: swap tls.certresolver=letsencrypt for tls=true so
  # Traefik serves the file-provider's combined fullchain.
  signalfi-manifest:
    labels: !override
      - "traefik.enable=true"
      - "traefik.http.routers.signalfi-manifest-http.rule=Host(`apis.symphonyinteractive.ca`) && PathPrefix(`/ota`)"
      - "traefik.http.routers.signalfi-manifest-http.entrypoints=web"
      - "traefik.http.routers.signalfi-manifest-http.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-manifest-http.priority=10"
      - "traefik.http.services.signalfi-manifest.loadbalancer.server.port=3001"
      - "traefik.http.routers.signalfi-manifest-https.rule=Host(`apis.symphonyinteractive.ca`) && PathPrefix(`/ota`)"
      - "traefik.http.routers.signalfi-manifest-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-manifest-https.tls=true"
      - "traefik.http.routers.signalfi-manifest-https.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-manifest-https.priority=10"
      # Admin subdomain — still rate-limited on /auth (see prod comment), but
      # certs now come from file provider instead of ACME.
      - "traefik.http.middlewares.admin-auth-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.admin-auth-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.admin-auth-ratelimit.ratelimit.period=1s"
      - "traefik.http.routers.signalfi-admin-http.rule=Host(`admin.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-admin-http.entrypoints=web"
      - "traefik.http.routers.signalfi-admin-http.middlewares=redirect-https@docker"
      - "traefik.http.routers.signalfi-admin-http.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-admin-auth-https.rule=Host(`admin.apis.symphonyinteractive.ca`) && PathPrefix(`/ota/admin/auth`)"
      - "traefik.http.routers.signalfi-admin-auth-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-admin-auth-https.tls=true"
      - "traefik.http.routers.signalfi-admin-auth-https.middlewares=admin-auth-ratelimit"
      - "traefik.http.routers.signalfi-admin-auth-https.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-admin-auth-https.priority=20"
      - "traefik.http.routers.signalfi-admin-https.rule=Host(`admin.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-admin-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-admin-https.tls=true"
      - "traefik.http.routers.signalfi-admin-https.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-admin-https.priority=10"

  # ── dnsmasq + chrony (Mode A / served profile only) ──────────────────────
  # Host networking required for DHCP broadcast semantics.  Binds exclusively
  # to AIRGAP_DEVICE_INTERFACE so ops LAN stays clean.  Rendered configs live
  # at /root/config/ (setup.sh writes them from the templates).
  dnsmasq-chrony:
    profiles: ["served"]
    build:
      context: ./airgap
      dockerfile: Dockerfile.dnsmasq-chrony
    container_name: signalfi-dnsmasq-chrony
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    volumes:
      - ./airgap/dnsmasq.conf.rendered:/etc/dnsmasq/dnsmasq.conf:ro
      - ./airgap/chrony.conf.rendered:/etc/chrony/chrony.conf:ro
      - dnsmasq-leases:/var/lib/misc
      - chrony-drift:/var/lib/chrony

volumes:
  dnsmasq-leases:
  chrony-drift:
