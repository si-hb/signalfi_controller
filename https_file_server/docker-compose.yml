version: "3"

# ─────────────────────────────────────────────────────────────────────────────
# Single compose file for all services on apis.symphonyinteractive.ca
#
# OTA endpoints (single hostname, path-based routing):
#   https://apis.symphonyinteractive.ca/ota/v1/manifest  → signalfi-manifest
#   https://apis.symphonyinteractive.ca/ota/v1/firmware/ → signalfi-files (nginx)
#   https://apis.symphonyinteractive.ca/ota/v1/audio/    → signalfi-files (nginx)
#   https://apis.symphonyinteractive.ca/ota/v1/report    → signalfi-manifest
#   sftp://apis.symphonyinteractive.ca:2022               → sftpgo (admin uploads)
#
# HTTPS PHASE (current):
#   - OTA served over HTTPS using the Signalfi custom PKI cert
#   - HTTP also kept active (firmware falls back to HTTP on TLS failure)
#   - Traefik file provider loads ./certs/signalfi-web.fullchain.pem + .key
#   - Dynamic TLS config in ./traefik-dynamic/tls.yml
#   - Devices trust Signalfi Root CA (compiled into firmware, NOT Let's Encrypt)
#
# TO UPGRADE TO MQTTS (when all devices support TLS):
#   1. Copy TLS cert/key into /root/config/ and add listener 8883 to mosquitto.conf
#   2. Uncomment the :8883 and :9443 port mappings below
#   3. docker compose up -d mosquitto
#   4. Migrate devices to port 8883, then remove :1883 exposure
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Traefik — reverse proxy + custom Signalfi PKI cert ──────────────────
  traefik:
    image: traefik:v3
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=root_default"
      # File provider watches traefik-dynamic/ for the custom TLS cert config.
      # Traefik reloads TLS certs on file change without a restart.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Let's Encrypt kept for node-red / other subdomains that use browser certs
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@symphonyinteractive.ca"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/acme.json:/acme.json
      # Custom Signalfi cert — mounted read-only; referenced by traefik-dynamic/tls.yml
      - ./certs:/certs:ro
      # Dynamic config directory — watched by the file provider above
      - ./traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - root_default
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

  # ── Node-RED — weather API / automation ──────────────────────────────────
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    environment:
      - TZ=America/Toronto
      - OTP_SECRET=d4efad504590a39b884029516949e2a2fbdf2db8aabcc5e3e2e2af06f9130f81
    expose:
      - 1880
      - 3333/udp
    ports:
      - "3333:3333/udp"
    volumes:
      - ./nodered-data:/data
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      # HTTPS via weather subdomain (browser / editor access)
      - "traefik.http.routers.nodered-https.rule=Host(`weather.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.nodered-https.entrypoints=websecure"
      - "traefik.http.routers.nodered-https.service=nodered"
      - "traefik.http.routers.nodered-https.tls.certresolver=letsencrypt"
      # HTTP via weather subdomain — no redirect, supports plain-HTTP clients (IoT devices)
      - "traefik.http.routers.nodered-http.rule=Host(`weather.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.nodered-http.entrypoints=web"
      - "traefik.http.routers.nodered-http.service=nodered"
      # HTTP via apis subdomain — legacy/IoT path-based access
      - "traefik.http.routers.nodered-apis-http.rule=Host(`apis.symphonyinteractive.ca`) && (PathPrefix(`/weather`) || PathPrefix(`/symphony`) || PathPrefix(`/home/crittercam`) || PathPrefix(`/voipms`))"
      - "traefik.http.routers.nodered-apis-http.entrypoints=web"
      - "traefik.http.routers.nodered-apis-http.service=nodered"
      - "traefik.http.services.nodered.loadbalancer.server.port=1880"

  # ── Mosquitto — MQTT broker ───────────────────────────────────────────────
  # HTTP PHASE: plain MQTT :1883 and WebSocket :9001
  # MQTTS UPGRADE: copy cert to /root/config/, update mosquitto.conf,
  #                uncomment :8883/:9443 ports, migrate devices, then remove :1883
  mosquitto:
    image: eclipse-mosquitto:2
    user: mosquitto
    volumes:
      - type: bind
        source: ./config/
        target: /mosquitto/config/
      - type: bind
        source: ./log/
        target: /mosquitto/log/
      - type: volume
        source: mqtt-broker-data
        target: /mosquitto/data/
    ports:
      - target: 1883
        published: 1883
        protocol: tcp
        mode: host
      - target: 9001
        published: 9001
        protocol: tcp
        mode: host
      # MQTTS upgrade — uncomment when TLS configured in mosquitto.conf:
      # - target: 8883
      #   published: 8883
      #   protocol: tcp
      #   mode: host
      # - target: 9443
      #   published: 9443
      #   protocol: tcp
      #   mode: host
    restart: unless-stopped

  # ── OTA Manifest Service ──────────────────────────────────────────────────
  # Routes (all under /ota on apis.symphonyinteractive.ca):
  #   GET  /ota/v1/manifest?modelId=&firmwareVersion=  → device queries for update
  #   GET  /ota/v1/validate                            → nginx auth_request subrequest
  #   POST /ota/v1/report                              → device reports successful update
  #   GET  /ota/v1/health                              → health check
  #
  # Token auth: Authorization: Bearer <64-hex> header
  # Token expiry: token filename format is <64-hex>_exp<unix_seconds> (optional)
  # MQTT push: publishes to signalfi/ota/<modelId> when models/*.json is updated
  #
  # HTTPS UPGRADE: uncomment the -https router labels and add middlewares=redirect-https
  #                to the -http router label (see header comment above)
  signalfi-manifest:
    build:
      context: ./manifest-service
    container_name: signalfi-manifest
    restart: unless-stopped
    expose:
      - 3001
    volumes:
      - /opt/signalfi/manifests:/opt/signalfi/manifests
      - /opt/signalfi/tokens:/opt/signalfi/tokens
      - /opt/signalfi/reports:/opt/signalfi/reports
      - /opt/signalfi/configs:/opt/signalfi/configs:ro
      - /opt/signalfi/files/firmware:/opt/signalfi/files/firmware
      - /opt/signalfi/files/audio:/opt/signalfi/files/audio
      - /opt/signalfi/files/general:/opt/signalfi/files/general
    environment:
      - PORT=3001
      - MANIFEST_ROOT=/opt/signalfi/manifests
      - TOKEN_ROOT=/opt/signalfi/tokens
      - REPORTS_ROOT=/opt/signalfi/reports
      - CONFIG_ROOT=/opt/signalfi/configs
      - CONFIG_BASE_URL=https://apis.symphonyinteractive.ca/ota/v1/config
      - MQTT_BROKER_URL=mqtt://signalfi-svc:OtaService2024!@mosquitto:1883
      - MQTT_TOPIC_PREFIX=scout
      - FIRMWARE_ROOT=/opt/signalfi/files/firmware
      - AUDIO_ROOT=/opt/signalfi/files/audio
      - FILES_ROOT=/opt/signalfi/files/general
      - FILES_BASE_URL=https://apis.symphonyinteractive.ca
      - FILES_PATH_PREFIX=/ota/v1
      - ADMIN_TOKEN=signalfiadmin2026
      - DEVICE_MODEL=SF-100
    networks:
      - root_default
    depends_on:
      - mosquitto
    labels:
      - "traefik.enable=true"
      # signalfi-manifest handles all /ota/* paths including file downloads.
      # Node.js streams files directly so the admin panel can track per-device progress.
      # signalfi-files (nginx) is kept in the stack but removed from Traefik routing.
      - "traefik.http.routers.signalfi-manifest-http.rule=Host(`apis.symphonyinteractive.ca`) && PathPrefix(`/ota`)"
      - "traefik.http.routers.signalfi-manifest-http.entrypoints=web"
      - "traefik.http.routers.signalfi-manifest-http.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-manifest-http.priority=10"
      - "traefik.http.services.signalfi-manifest.loadbalancer.server.port=3001"
      # HTTPS via Signalfi custom PKI cert (loaded by file provider from ./certs/).
      # Uses tls=true — Traefik picks up the cert automatically from the dynamic config.
      # NO certresolver: devices trust Signalfi Root CA, not Let's Encrypt.
      - "traefik.http.routers.signalfi-manifest-https.rule=Host(`apis.symphonyinteractive.ca`) && PathPrefix(`/ota`)"
      - "traefik.http.routers.signalfi-manifest-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-manifest-https.tls=true"
      - "traefik.http.routers.signalfi-manifest-https.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-manifest-https.priority=10"
      # Admin subdomain — Let's Encrypt cert for human browser access.
      # server.js root redirect (/ → /ota/admin) means the panel is at https://admin.apis.symphonyinteractive.ca
      # Rate-limit: 5 req/s avg, burst 10 — throttles bearer token brute-force attempts.
      # HTTP redirects to HTTPS so tokens are never sent in plaintext.
      - "traefik.http.middlewares.admin-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.admin-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.admin-ratelimit.ratelimit.period=1s"
      - "traefik.http.routers.signalfi-admin-http.rule=Host(`admin.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-admin-http.entrypoints=web"
      - "traefik.http.routers.signalfi-admin-http.middlewares=redirect-https@docker"
      - "traefik.http.routers.signalfi-admin-http.service=signalfi-manifest"
      - "traefik.http.routers.signalfi-admin-https.rule=Host(`admin.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-admin-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-admin-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signalfi-admin-https.middlewares=admin-ratelimit"
      - "traefik.http.routers.signalfi-admin-https.service=signalfi-manifest"

  # ── OTA File Server (nginx) ───────────────────────────────────────────────
  # Kept in the stack but removed from Traefik routing.
  # File serving (firmware, audio, config) is now handled by signalfi-manifest
  # (Node.js) so the admin panel can track per-device download progress via SSE.
  # Re-enable Traefik labels here (and lower signalfi-manifest priority) to
  # revert to direct nginx serving if Node.js overhead becomes a concern.
  signalfi-files:
    image: nginx:alpine
    container_name: signalfi-files
    restart: unless-stopped
    expose:
      - 80
    volumes:
      - /root/nginx-ota.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/signalfi/files:/opt/signalfi/files:ro
      - /opt/signalfi/configs:/opt/signalfi/configs:ro
    networks:
      - root_default
    labels:
      - "traefik.enable=false"

  # ── SFTP Server (sftpgo) ──────────────────────────────────────────────────
  # Admin uploads for firmware, audio, manifests, tokens
  # Credentials: symphony / Si9057274427
  # Virtual dirs: /firmware /audio /manifests /tokens /reports
  sftpgo:
    image: drakkan/sftpgo:latest
    container_name: sftpgo
    restart: unless-stopped
    environment:
      - SFTPGO_LOADDATA_FROM=/etc/sftpgo/init-data.json
      - SFTPGO_LOADDATA_CLEAN=0
      - SFTPGO_SFTPD__BINDINGS__0__PORT=2022
    volumes:
      - /root/sftpgo-init.json:/etc/sftpgo/init-data.json:ro
      - /opt/signalfi/files/firmware:/opt/signalfi/files/firmware
      - /opt/signalfi/files/audio:/opt/signalfi/files/audio
      - /opt/signalfi/manifests:/opt/signalfi/manifests
      - /opt/signalfi/tokens:/opt/signalfi/tokens
      - /opt/signalfi/reports:/opt/signalfi/reports:ro
      - /opt/signalfi/configs/models:/opt/signalfi/configs/models
      - /opt/signalfi/configs/devices:/opt/signalfi/configs/devices
      - sftpgo-state:/var/lib/sftpgo
    ports:
      - "2222:2022"
    networks:
      - root_default

networks:
  root_default:
    external: true

volumes:
  mqtt-broker-data:
    name: "mqtt-broker-data"
  sftpgo-state:
    name: "sftpgo-state"
