# ── Performance tuning ────────────────────────────────────────────────────────
# All /ota/ requests are proxied to signalfi-manifest (Node.js).
# Node.js validates auth, streams files, and emits live progress events to the
# admin SSE channel.  proxy_buffering off ensures bytes flow to the client
# without nginx accumulating them — required for streaming progress tracking.

sendfile    on;
tcp_nopush  on;
tcp_nodelay on;

server {
    listen 80;
    server_name _;

    # All OTA + admin traffic → Node.js manifest service
    location /ota/ {
        proxy_pass         http://signalfi-manifest:3001;
        proxy_set_header   Authorization $http_authorization;
        proxy_set_header   X-Real-IP     $remote_addr;
        proxy_set_header   Host          $host;
        proxy_http_version 1.1;
        proxy_buffering    off;       # stream directly — required for progress tracking
        proxy_read_timeout 300s;      # 5 min covers large firmware downloads
    }
}
