server {
    listen 80;
    server_name _;

    # Firmware files — Authorization: Bearer <token> required
    location /ota/v1/firmware/ {
        auth_request /_ota-validate;
        error_page 401 403 = @auth_denied;

        alias /opt/signalfi/files/firmware/;
        add_header Accept-Ranges bytes;
        add_header Content-Type application/octet-stream;
        try_files $uri =404;
    }

    # Audio files — Authorization: Bearer <token> required
    location /ota/v1/audio/ {
        auth_request /_ota-validate;
        error_page 401 403 = @auth_denied;

        alias /opt/signalfi/files/audio/;
        add_header Accept-Ranges bytes;
        try_files $uri =404;
    }

    # Internal token validation subrequest → manifest service
    # nginx forwards the Authorization: Bearer header directly
    # X-Original-URI included as fallback for legacy transition
    location = /_ota-validate {
        internal;
        proxy_pass http://signalfi-manifest:3001/ota/v1/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }

    location @auth_denied {
        return 403 '{"error":"valid Authorization: Bearer token required"}';
        add_header Content-Type application/json always;
    }

    # Unauthenticated health check
    location /ota/health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
