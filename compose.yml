services:
  signalfi-web:
    build: .
    restart: unless-stopped
    expose:
      - 3000
    volumes:
      - ./data:/app/data
      - /opt/signalfi/files/audio:/app/audio:ro
      - ./firmware:/app/firmware
    env_file: .env
    environment:
      - MQTT_HOST=${MQTT_HOST:-apis.symphonyinteractive.ca}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_TLS=${MQTT_TLS:-false}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    networks:
      - default
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.signalfi-https.rule=Host(`signalfi.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-https.entrypoints=websecure"
      - "traefik.http.routers.signalfi-https.middlewares=signalfi-ratelimit"
      - "traefik.http.routers.signalfi-https.service=signalfi"
      - "traefik.http.routers.signalfi-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signalfi-http.rule=Host(`signalfi.apis.symphonyinteractive.ca`)"
      - "traefik.http.routers.signalfi-http.entrypoints=web"
      - "traefik.http.routers.signalfi-http.middlewares=redirect-https"
      - "traefik.http.services.signalfi.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.signalfi-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.signalfi-ratelimit.ratelimit.burst=40"
      - "traefik.http.middlewares.signalfi-ratelimit.ratelimit.period=1s"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  root_default:
    external: true
